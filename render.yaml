# Render 部署配置
# 部署方式: 在 Render Dashboard 中选择 "New Web Service" → 连接 GitHub 仓库
# 或者直接使用本文件: New Web Service → Deploy from render.yaml

services:
  # ── 后端 API ──
  - type: web
    name: lol-tracker-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    region: oregon
    branch: main
    rootDir: .
    envVars:
      - key: APP_NAME
        value: LOL Tracker
      - key: RIOT_GATEWAY_URL
        value: https://api.riot-gateway.cn
      - key: CACHE_TTL
        value: "300"
      - key: RATE_LIMIT_PER_SECOND
        value: "20"
      - key: RATE_LIMIT_PER_MINUTE
        value: "100"
      - key: PYTHON_VERSION
        value: "3.11"
